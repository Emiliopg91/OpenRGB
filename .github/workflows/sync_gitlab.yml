name: Sync with GitLab

on:
  schedule:
    - cron: '0 * * * *' # Cada hora
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout GitHub repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Git identity
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"

      - name: Add GitLab remote
        run: git remote add gitlab https://gitlab.com/ojosdeserbio/OpenRGB.git

      - name: Fetch GitLab changes
        run: git fetch gitlab

      - name: Merge GitLab changes ignoring workflows
        run: |
          git checkout master
          git merge gitlab/master --allow-unrelated-histories --no-commit
          git rm -r --cached .github/workflows || true
          git commit -m "Merge changes from GitLab, ignoring workflows"
          git push origin master
